name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: brew install duckdb
      - run: xcodebuild -scheme Cove -derivedDataPath .build build
      - run: xcodebuild -scheme Cove -derivedDataPath .build test
