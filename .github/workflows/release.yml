name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: xcodebuild -scheme Cove -configuration Release -derivedDataPath .build build

      - name: Package app
        run: |
          APP_PATH=".build/Build/Products/Release/Cove.app"
          # Create DMG
          hdiutil create -volname "Cove" -srcfolder "$APP_PATH" -ov -format UDZO Cove.dmg
          # Create ZIP
          ditto -c -k --keepParent "$APP_PATH" Cove.app.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Cove.dmg
            Cove.app.zip
          generate_release_notes: true
